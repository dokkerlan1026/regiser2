<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>科別管理 - 憨吉聯合大醫院</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div><h1><a class="brand-link" href="./index.html">憨吉聯合大醫院</a></h1><p>科別與醫師管理</p></div>
      <div class="topbar-actions system-switch">
        <a href="./patient-system.html">病人系統</a>
        <a href="./billing-system.html">批價櫃台</a>
        <a href="./doctor-system.html" class="active">醫生系統</a>
        <a href="./management-system.html">管理系統</a>
      </div>
    </header>
    <nav class="site-nav">
      <a href="./doctor-system.html">醫生系統首頁</a>
      <a href="./departments.html" class="active">科別管理</a>
      <a href="./schedule.html">排班管理</a>
      <a href="./rules.html">規則與給號</a>
      <a href="./orders.html">門急診醫囑</a>
      <a href="./index.html">系統入口</a>
      <a href="./data-management.html">資料管理</a>
    </nav>
    <main>
      <div class="grid two">
        <article class="card">
          <h2>新增科別</h2>
          <div class="field-row">
            <input id="dept-name" placeholder="例如：心臟內科" />
            <button id="btn-add-department">新增科別</button>
          </div>
          <h2>新增醫師</h2>
          <div class="field-row">
            <input id="dept-doctor-name" placeholder="醫師姓名" />
            <select id="dept-doctor-department"></select>
            <button id="btn-add-doctor">新增醫師</button>
          </div>
          <p>刪除規則：科別底下還有醫師不可刪。已有掛號紀錄的醫師不可刪。</p>
        </article>
        <article class="card">
          <h2>科別與醫師總覽</h2>
          <div class="table-wrap"><table id="departments-table"></table></div>
          <h2 style="margin-top: 14px">醫師清單</h2>
          <div class="table-wrap"><table id="doctors-table"></table></div>
        </article>
      </div>
    </main>
    <div id="toast"></div>
    <script src="./app.js"></script>
  </body>
</html>
